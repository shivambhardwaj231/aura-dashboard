version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aura-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # FastAPI Backend
  backend:
    build: .
    container_name: aura-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN:-}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - .:/app  # Hot reload in development
      - /app/__pycache__  # Exclude pycache
    restart: unless-stopped

  # Next.js Frontend (Optional - usually run separately)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: aura-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
  #     - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: aura-network
